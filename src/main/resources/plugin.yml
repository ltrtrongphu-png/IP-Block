name: IPLock
version: 1.0
main: com.trongphu.iplock.Main
api-version: '1.21'
description: Player IP Whitelist - Only allow join from saved IP
authors:
  - trongphu

commands:
  iplock:
    description: IP-Lock admin commands
    usage: /iplock <check|reset|list|reload>
    permission: iplock.admin
    aliases:
      - ipl

permissions:
  iplock.admin:
    description: Admin permission for IPLock
    default: op
